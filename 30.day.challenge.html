<!DOCTYPE html>
<html lang="bn">
<head>
	<meta charset="UTF-8">
	<meta name="viewport" content="width=device-width, initial-scale=1.0">
	<title>30 Days Discipline Challenge</title>
	<script src="https://cdn.tailwindcss.com"></script>
	<style>
		.day-card {
			transition: all 0.3s ease;
		}
		.day-card:hover {
			transform: translateY(-5px);
		}
		input[type="checkbox"]:checked + label {
			text-decoration: line-through;
			color: #10b981;
		}
	</style>
</head>
<body class="bg-gray-900 text-gray-100 font-sans">

	<div class="container mx-auto px-4 py-10">
		<header class="text-center mb-12">
			<h1 class="text-4xl md:text-5xl font-bold text-emerald-500 mb-4">
				৩০ দিনের চ্যালেঞ্জ (দৃষ্টি সংযত রাখা)
			</h1>
			<p class="text-gray-400 text-lg">
				শুরু: ১৫ এপ্রিল, ২০২৬ | লক্ষ্য: আত্ম-নিয়ন্ত্রণ ও ঈমানি শক্তি বৃদ্ধি
			</p>
			<div class="mt-6 flex justify-center gap-4">
				<span class="bg-emerald-900 text-emerald-300 px-4 py-1 rounded-full text-sm font-semibold border border-emerald-500">
					Commerce Stream
				</span>
				<span class="bg-blue-900 text-blue-300 px-4 py-1 rounded-full text-sm font-semibold border border-blue-500">
					Full-stack Journey
				</span>
			</div>
		</header>

		<div class="grid grid-cols-1 md:grid-cols-3 gap-6 mb-10 text-center">
			<div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
				<h3 class="text-gray-400">মোট দিন</h3>
				<p class="text-3xl font-bold">
					৩০
				</p>
			</div>
			<div class="bg-gray-800 p-6 rounded-xl border border-gray-700 border-l-4 border-l-emerald-500">
				<h3 class="text-gray-400">বাকি আছে</h3>
				<p id="days-left" class="text-3xl font-bold">
					৩০
				</p>
			</div>
			<div class="bg-gray-800 p-6 rounded-xl border border-gray-700">
				<h3 class="text-gray-400">বর্তমান অবস্থা</h3>
				<p class="text-xl font-semibold text-yellow-500">
					শুরু হলো...
				</p>
			</div>
		</div>

		<div class="grid grid-cols-3 sm:grid-cols-5 md:grid-cols-6 lg:grid-cols-10 gap-4" id="challenge-grid">
		</div>

		<footer class="mt-16 p-6 bg-gray-800 rounded-2xl text-center border-t-4 border-emerald-600">
			<p class="italic text-gray-300">
				"দৃষ্টি আমার আমানত, আমার লক্ষ্য আমার ভবিষ্যৎ।"
			</p>
			<div class="mt-4 text-sm text-gray-500">
				Created for Ebrat's Growth Strategy
			</div>
		</footer>
	</div>

	<script>
		const grid = document.getElementById('challenge-grid');
		const daysLeftDisplay = document.getElementById('days-left');

		// localStorage থেকে সেভ করা ডাটা লোড করা অথবা নতুন অবজেক্ট তৈরি করা
		let challengeData = JSON.parse(localStorage.getItem('ebratChallenge')) || {};

		function initChallenge() {
			grid.innerHTML = ''; // গ্রিড ক্লিয়ার করা
			let completedCount = 0;

			for (let i = 1; i <= 30; i++) {
				const isChecked = challengeData[i] ? 'checked': '';
				if (challengeData[i]) completedCount++;

				const dayDiv = document.createElement('div');
				dayDiv.className = `day-card bg-gray-800 border ${challengeData[i] ? 'bg-emerald-950 border-emerald-500': 'border-gray-700'} rounded-lg p-4 flex flex-col items-center justify-center cursor-pointer hover:border-emerald-500`;

				dayDiv.innerHTML = `
				<span class="text-xs text-gray-500 mb-1 font-bold">DAY</span>
				<span class="text-2xl font-bold mb-2">${i}</span>
				<input type="checkbox" id="day-${i}" class="w-5 h-5 cursor-pointer accent-emerald-500" ${isChecked} onchange="toggleDay(${i}, this)">
				`;

				grid.appendChild(dayDiv);
			}

			// বাকি দিন আপডেট করা
			daysLeftDisplay.innerText = 30 - completedCount;
		}

		function toggleDay(dayNumber, checkbox) {
			// ডাটা আপডেট করা
			challengeData[dayNumber] = checkbox.checked;

			// localStorage-এ সেভ করা
			localStorage.setItem('ebratChallenge', JSON.stringify(challengeData));

			// UI আপডেট করার জন্য পুনরায় লোড করা
			initChallenge();
		}

		// পেজ লোড হওয়ার সময় ফাংশনটি কল করা
		initChallenge();
	</script>
</body>
</html>
